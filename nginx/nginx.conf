events {}

http {
    server {
        listen 80;

        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # Flink UI
        location /flink/ {
            proxy_pass http://jobmanager:8081/;
            proxy_set_header Host $host;
        }

        # Metabase
        location /pgadmin/ {
            proxy_pass http://pgadmin:5050/;
            proxy_set_header Host $host;
        }

        location /redpanda/ {
            proxy_pass http://redpanda-console:8080/;
            proxy_set_header Host $host;
        }

    }
}
events {}

http {
    server {
        listen 80;

        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # -------------------
        # Flink UI
        # -------------------
        location /flink/ {
            proxy_pass http://jobmanager:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Fix trailing slash behavior
            rewrite ^/flink/(.*)$ /$1 break;
        }

        # -------------------
        # pgAdmin (FIXED)
        # -------------------
        location /pgadmin/ {
            proxy_pass http://pgadmin:5050/;

            proxy_set_header Host $host;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_set_header X-Scheme $scheme;
            proxy_set_header X-Real-IP $remote_addr;

            rewrite ^/pgadmin/(.*)$ /$1 break;
        }

        # -------------------
        # Redpanda Console (FIXED)
        # -------------------
        location /redpanda/ {
            proxy_pass http://redpanda-console:8080/;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # 🔥 critical for static files
            rewrite ^/redpanda/(.*)$ /$1 break;
        }
    }
}
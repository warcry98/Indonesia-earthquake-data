services:
  redpanda:
    image: redpandadata/redpanda:v26.1.4
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - '1'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr
      - PLAINTEXT://0.0.0.0:28082,OUTSIDE://0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - PLAINTEXT://redpanda:28082,OUTSIDE://localhost:8082
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
      - --set
      - redpanda.enable_sasl=true
      - --set
      - redpanda.superusers=["${RP_USER}"]
    environment:
      - RP_USER=${RP_USER}
      - RP_PASSWORD=${RP_PASSWORD}
    env_file:
      - .env
    ports:
      - 8082:8082
      - 9092:9092
      - 28082:28082
      - 29092:29092
      - 9644:9644
  
  create-user:
    image: redpandadata/redpanda:v26.1.4
    depends_on:
      - redpanda
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        sleep 5;
        rpk security user create $${RP_USER} -p $${RP_PASSWORD} --mechanism SCRAM-SHA-256 --api-urls redpanda:9644
    environment:
      - RP_USER=${RP_USER}
      - RP_PASSWORD=${RP_PASSWORD}
    env_file:
      - .env

  redpanda-console:
    image: redpandadata/console:v3.7.1
    restart: unless-stopped
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
      KAFKA_SASL_ENABLED: true
      KAFKA_SASL_MECHANISM: SCRAM-SHA-256
      KAFKA_SASL_USERNAME: ${RP_USER}
      KAFKA_SASL_PASSWORD: ${RP_PASSWORD}
    env_file:
      - .env

  jobmanager:
    build:
      context: .
      dockerfile: flink-jobmanager/Dockerfile
    restart: unless-stopped
    depends_on:
      - redpanda
      - timescaledb
    expose:
      - "6123"
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
      - flink-logs:/opt/flink/log
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        jobmanager.memory.process.size: 1600m
    env_file:
      - .env
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE

  taskmanager:
    build:
      context: .
      dockerfile: flink-taskmanager/Dockerfile
    restart: unless-stopped
    expose:
      - "6121"
      - "6122"
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
      - flink-logs:/opt/flink/log
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.memory.process.size: 1728m
        taskmanager.numberOfTaskSlots: 15
        taskmanager.registration.timeout: 5 min
        parallelism.default: 3
    env_file:
      - .env
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    

  timescaledb:
    image: timescale/timescaledb:2.26.3-pg18
    restart: on-failure
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${TIMESCALEDB_DB}
      - POSTGRES_USER=${TIMESCALEDB_USER}
      - POSTGRES_PASSWORD=${TIMESCALEDB_PASSWORD}
    ports:
      - "5432:5432"
  
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_DB}
      MB_DB_PORT: ${METABASE_DB_PORT}
      MB_DB_USER: ${METABASE_DB_USER}
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: ${METABASE_DB_HOST}
    env_file:
      - .env
    depends_on:
      - metabase-db
    restart: unless-stopped

  metabase-db:
    image: postgres:15-alpine
    container_name: metabase-db
    environment:
      POSTGRES_DB: ${METABASE_DB}
      POSTGRES_USER: ${METABASE_DB_USER}
      POSTGRES_PASSWORD: ${METABASE_DB_PASSWORD}
    env_file:
      - .env
    volumes:
      - metabase_data:/var/lib/postgresql/data
    restart: unless-stopped
    depends_on:
      - jobmanager
      - taskmanager

  nginx:
    build: ./nginx
    ports:
      - "8082:80"
    env_file:
      - .env
    depends_on:
      - jobmanager
      - metabase

volumes:
  flink-logs:
  metabase_data: